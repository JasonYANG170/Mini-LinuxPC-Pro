name: Build Longan H618 Firmware

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true
    
    - name: Checkout LFS objects
      run: git lfs pull
    
    - name: Cache build output
      uses: actions/cache@v4
      with:
        path: |
          out
          build/toolchain/**/
          !build/toolchain/*.tar.*
        key: ${{ runner.os }}-build-${{ hashFiles('**/Makefile', '**/*.config') }}
        restore-keys: |
          ${{ runner.os }}-build-
    
    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          libncurses5-dev \
          libssl-dev \
          bc \
          bison \
          flex \
          u-boot-tools \
          python3 \
          python3-dev \
          python3-pip \
          swig \
          device-tree-compiler \
          libpython3-dev \
          cpio \
          gawk \
          wget \
          unzip \
          dosfstools \
          mtools \
          kmod
    
    - name: Extract toolchains
      run: |
        # Extract toolchains from LFS
        cd build/toolchain
        for f in *.tar.xz *.tar.bz2; do
          if [ -f "$f" ]; then
            echo "Extracting $f..."
            tar -xf "$f"
          fi
        done
        cd ../..
    
    - name: Configure build
      run: |
        chmod +x build.sh
        ./build.sh autoconfig -i h618 -o linux -b p1 -n default -k linux-5.4 -a arm64
    
    - name: Build bootloader
      run: |
        ./build.sh bootloader
    
    - name: Build kernel
      run: |
        ./build.sh kernel
    
    - name: Build rootfs
      run: |
        ./build.sh rootfs
    
    - name: Pack firmware
      run: |
        ./build.sh pack
    
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: longan-h618-firmware
        path: |
          out/pack_out/*.img
          out/pack_out/*.fex
        retention-days: 30
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          out/**/*.log
          out/**/build.log
        retention-days: 7
