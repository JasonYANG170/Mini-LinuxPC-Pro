name: Build Longan H618 Firmware

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        df -h
    
    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          libncurses5-dev \
          libssl-dev \
          bc \
          bison \
          flex \
          u-boot-tools \
          python3 \
          python3-dev \
          python3-pip \
          swig \
          device-tree-compiler \
          libpython3-dev \
          cpio \
          gawk \
          wget \
          unzip \
          dosfstools \
          mtools \
          kmod
        
        # Create python symlink if needed
        if [ ! -f /usr/bin/python ]; then
          sudo ln -s /usr/bin/python3 /usr/bin/python
        fi
    
    - name: Cache toolchains
      uses: actions/cache@v4
      with:
        path: |
          build/toolchain
          brandy/brandy-2.0/tools/toolchain
        key: toolchains-${{ runner.os }}-v1
        restore-keys: |
          toolchains-${{ runner.os }}-
    
    - name: Download and setup toolchain
      run: |
        # Create toolchain directories
        mkdir -p build/toolchain
        mkdir -p brandy/brandy-2.0/tools/toolchain
        
        echo "Downloading toolchains for kernel build..."
        cd build/toolchain
        
        # Download ARM64 toolchain (for kernel)
        if [ ! -f gcc-linaro-5.3.1-2016.05-x86_64_aarch64-linux-gnu.tar.xz ]; then
          echo "Downloading ARM64 toolchain..."
          wget https://releases.linaro.org/components/toolchain/binaries/5.3-2016.05/aarch64-linux-gnu/gcc-linaro-5.3.1-2016.05-x86_64_aarch64-linux-gnu.tar.xz
        fi
        
        # Download ARM toolchain (for kernel)
        if [ ! -f gcc-linaro-5.3.1-2016.05-x86_64_arm-linux-gnueabi.tar.xz ]; then
          echo "Downloading ARM toolchain..."
          wget https://releases.linaro.org/components/toolchain/binaries/5.3-2016.05/arm-linux-gnueabi/gcc-linaro-5.3.1-2016.05-x86_64_arm-linux-gnueabi.tar.xz
        fi
        
        cd ../../brandy/brandy-2.0/tools/toolchain
        
        echo "Downloading toolchains for bootloader build..."
        
        # Download ARM toolchain for bootloader (gcc 7.2.1)
        if [ ! -f gcc-linaro-7.2.1-2017.11-x86_64_arm-linux-gnueabi.tar.xz ]; then
          echo "Downloading ARM 7.2.1 toolchain..."
          wget https://releases.linaro.org/components/toolchain/binaries/7.2-2017.11/arm-linux-gnueabi/gcc-linaro-7.2.1-2017.11-x86_64_arm-linux-gnueabi.tar.xz
        fi
        
        # Download RISC-V toolchain for bootloader
        if [ ! -f riscv64-linux-x86_64-20200528.tar.xz ]; then
          echo "Downloading RISC-V toolchain..."
          # Try multiple sources for RISC-V toolchain
          wget https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2023.07.07/riscv64-glibc-ubuntu-20.04-gcc-nightly-2023.07.07-nightly.tar.gz -O riscv64-linux-x86_64-20200528.tar.gz && \
          mv riscv64-linux-x86_64-20200528.tar.gz riscv64-linux-x86_64-20200528.tar.xz || \
          echo "Warning: RISC-V toolchain download failed, bootloader build may fail"
        fi
        
        cd ../../../..
        
        echo "Toolchain setup completed"
        echo "Kernel toolchains:"
        ls -lh build/toolchain/ || true
        echo "Bootloader toolchains:"
        ls -lh brandy/brandy-2.0/tools/toolchain/ || true
    
    - name: Configure build
      run: |
        chmod +x build.sh
        
        # Don't clean u-boot to avoid Makefile bugs
        # The checkout is already clean in GitHub Actions
        
        ./build.sh autoconfig -i h618 -o linux -b p1 -n default -k linux-5.4 -a arm64
    
    - name: Build bootloader
      run: |
        # Workaround for u-boot Makefile LDSCRIPT bug
        # Copy u-boot.lds to armv7 directory
        echo "Creating u-boot.lds in armv7 directory..."
        cp -v brandy/brandy-2.0/u-boot-2018/arch/arm/cpu/u-boot.lds \
           brandy/brandy-2.0/u-boot-2018/arch/arm/cpu/armv7/u-boot.lds
        
        # Verify the file exists
        ls -la brandy/brandy-2.0/u-boot-2018/arch/arm/cpu/armv7/u-boot.lds
        
        # Pre-build scripts including dtc to avoid parallel build issues
        echo "Building u-boot scripts..."
        cd brandy/brandy-2.0/u-boot-2018
        make scripts
        cd ../../..
        
        ./build.sh bootloader
    
    - name: Build kernel
      run: |
        ./build.sh kernel
    
    - name: Build rootfs
      run: |
        ./build.sh rootfs
    
    - name: Pack firmware
      run: |
        ./build.sh pack
    
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: longan-h618-firmware
        path: |
          out/pack_out/*.img
          out/pack_out/*.fex
        retention-days: 30
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          out/**/*.log
          out/**/build.log
        retention-days: 7
