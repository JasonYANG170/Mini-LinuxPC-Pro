name: Build Longan H618 Firmware

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          libncurses5-dev \
          libssl-dev \
          bc \
          bison \
          flex \
          u-boot-tools \
          python3 \
          python3-dev \
          python3-pip \
          swig \
          device-tree-compiler \
          libpython3-dev \
          cpio \
          gawk \
          wget \
          unzip \
          dosfstools \
          mtools \
          kmod
    
    - name: Download and setup toolchain
      run: |
        mkdir -p out
        cd out
        if [ ! -f gcc-linaro-5.3.1-2016.05-x86_64_aarch64-linux-gnu.tar.xz ]; then
          wget -q https://releases.linaro.org/components/toolchain/binaries/5.3-2016.05/aarch64-linux-gnu/gcc-linaro-5.3.1-2016.05-x86_64_aarch64-linux-gnu.tar.xz
        fi
        tar -xf gcc-linaro-5.3.1-2016.05-x86_64_aarch64-linux-gnu.tar.xz
        cd ..
    
    - name: Configure build
      run: |
        chmod +x build.sh
        ./build.sh autoconfig -i h618 -o linux -b p1 -n default -k linux-5.4 -a arm64
    
    - name: Build bootloader
      run: |
        ./build.sh bootloader
    
    - name: Build kernel
      run: |
        ./build.sh kernel
    
    - name: Build rootfs
      run: |
        ./build.sh rootfs
    
    - name: Pack firmware
      run: |
        ./build.sh pack
    
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: longan-h618-firmware
        path: |
          out/pack_out/*.img
          out/pack_out/*.fex
        retention-days: 30
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          out/**/*.log
          out/**/build.log
        retention-days: 7
